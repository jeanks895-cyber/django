{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Visit Counter - Track your page visits with a beautiful interface">
    <title>{% block title %}Visit Counter{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'home' %}" class="navbar-brand">✦ VisitCounter</a>
        <div class="navbar-links">
            {% if user.is_authenticated %}
                <a href="{% url 'visit_counter' %}">Visit Counter</a>
                <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'signup' %}" class="btn-nav">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main class="page-container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        &copy; 2026 VisitCounter. Built with Django.
    </footer>

</body>
</html>
