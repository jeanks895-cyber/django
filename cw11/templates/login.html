{% extends 'base.html' %}

{% block title %}Login - Visit Counter{% endblock %}

{% block content %}
<div class="card">
    <h1 class="card-title">Welcome Back</h1>
    <p class="card-subtitle">Log in to see your visit counter</p>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="POST" novalidate>
        {% csrf_token %}
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-input" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" class="form-input" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>

    <div class="divider"><span>or</span></div>
    <a href="{% url 'signup' %}" class="btn btn-secondary">Don't have an account? Sign Up</a>
</div>
{% endblock %}
