{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Records{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'students/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">🎓</span>
            <span class="nav-title">Student Records</span>
        </div>
        <div class="nav-links">
            <a href="{% url 'student_list' %}" class="nav-link">Home</a>
            <a href="{% url 'add_student' %}" class="nav-link btn-nav">+ Add Student</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}

    <footer class="footer">
        <p>&copy; 2026 Student Records Management System</p>
    </footer>

</html>
