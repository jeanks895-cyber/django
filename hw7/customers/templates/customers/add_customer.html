{% extends 'customers/base.html' %}
{% block content %}
<div class="card">
    <h1>Add Customer</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="{{ form.name.id_for_label }}">Name</label>
            {{ form.name }}
        </div>
        <div class="form-group">
            <label for="{{ form.email.id_for_label }}">Email</label>
            {{ form.email }}
        </div>
        <button type="submit">Save Customer</button>
    </form>
</div>
{% endblock %}
